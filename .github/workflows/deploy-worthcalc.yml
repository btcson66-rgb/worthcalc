name: Deploy WorthCalc

on:
  push:
    branches: [main]
    paths:
      - 'sites/worth-it-tools/**'
      - '.github/workflows/deploy-worthcalc.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-worthcalc
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/worth-it-tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sites/worth-it-tools/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          SITE_URL: https://worthcalc.win
          PUBLIC_GA_ID: ${{ vars.WORTHCALC_GA_ID }}
          PUBLIC_ADSENSE_CLIENT: ${{ vars.WORTHCALC_ADSENSE_CLIENT }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: sites/worth-it-tools/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
